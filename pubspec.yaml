name: food_delivery
description: "A food delivery app with Firebase Auth."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase Auth (locked versions compatible with Flutter 3.35.4 / Dart 3.9.2)
  firebase_core: 3.6.0
  firebase_auth: 5.3.1

  # State management
  provider: 6.1.5+1

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Maps
  google_maps_flutter: ^2.9.0
  google_maps_flutter_web: ^0.5.10

  # HTTP & local storage
  http: 1.5.0
  shared_preferences: 2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
