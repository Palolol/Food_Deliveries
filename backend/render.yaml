# Render Blueprint — https://render.com/docs/blueprint-spec
# 1. Click "New +" → "Blueprint" in the Render dashboard
# 2. Connect your repo
# 3. Set "Root Directory" if asked: backend
# 4. Render reads this file and creates the service
#
# NOTE: This file contains ONLY non-secret env vars. Add these in the
# Render dashboard after the first deploy (or via "Secret Files"):
#   - MSSQL_ODBC_CONNECTION_STRING
#   - SECRET_KEY  (Render can "Generate" this for you)
services:
  - type: web
    name: food-deliveries-api
    runtime: docker
    rootDir: backend
    plan: starter           # $7/mo, no sleep. Use "free" only for a demo (sleeps after 15 min).
    region: oregon          # closest to most users; change if needed.
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_HOST
        value: 0.0.0.0
      - key: APP_PORT
        value: "8000"
      - key: API_PREFIX
        value: /api/v1
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"

      # --- These two are set in the Render dashboard, NOT here ---
      # MSSQL_ODBC_CONNECTION_STRING  (Azure SQL FQDN, not 127.0.0.1)
      # SECRET_KEY                    (Render → "Generate Value")
